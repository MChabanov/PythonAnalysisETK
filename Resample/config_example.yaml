# ---------------------------------------------------------------------------
# Configuration for the 2D resampling pipeline.
#
# Copy this file, edit it for your simulation, and run:
#
#     mpirun -n <N> python resample_2d.py my_config.yaml
#
# resample_2d.py dispatches to the backend named below. You can also run a
# backend script directly (resample_2d_data_postcactus.py /
# resample_2d_data_kuibit.py).
#
# N (the number of MPI ranks) can be anything >= 1. Variables are distributed
# round-robin across ranks, so there is no required process count and no rank
# ever needs more memory than a single 2D slice at a time.
# ---------------------------------------------------------------------------

# Which reader library to use, when launched via resample_2d.py:
#   postcactus  -> resample_2d_data_postcactus.py (original library)
#   kuibit      -> resample_2d_data_kuibit.py     (maintained successor)
# Ignored if you run a backend script directly. Defaults to postcactus.
backend: postcactus

# Absolute path to the Einstein Toolkit simulation directory.
simdir: /mnt/raarchive/chabanov/direct_Urca_runs/dU_10_15_linear_HR

# Optional: cache the scanned SimDir as a pickle to speed up startup.
#   pickled: no   -> scan `simdir` normally; if `path` is set, the SimDir is
#                    saved there after the iteration query (the pickle then
#                    also carries the parsed HDF5 metadata).
#   pickled: yes  -> skip the scan entirely and load the SimDir from `path`.
# Re-create the pickle (pickled: no) whenever the simulation gains new output;
# a stale pickle will silently miss the new iterations.
# simdir_pickle:
#   pickled: no
#   path: ./simdir_cache.pkl

# Optional scan exclusions (postcactus backend only; ignored by kuibit).
#   dirs:  folder NAMES skipped entirely during the scan - this is what
#          actually saves time, since whole subtrees are pruned. Move
#          checkpoints/3D output into such folders for fast scans.
#   files: fnmatch-style basename globs dropped from the scan results.
#          Does NOT speed up the directory walk itself (entries must be
#          listed before they can be matched) but keeps e.g. mixed-in
#          checkpoint files out of the file list and the pickle.
# CAREFUL: patterns must not match files you need (2D *.xy.h5, *.par).
# simdir_exclude:
#   dirs: [checkpoints, 3D]
#   files: ["checkpoint.chkpt.*", "*.xyz.h5", "*.file_*.h5"]

# Short label used in output file names (e.g. rho_b__dU_10_15_linear_HR.h5).
label: dU_10_15_linear_HR

# Directory where the resampled HDF5 files are written (created if missing).
output_dir: ./resampled

# Directory scan mode.
#   parallel_scan: yes -> the directory walk is distributed across ranks: rank 0
#                         lists the top-level subdirectories below `simdir` and
#                         hands each rank a share to walk recursively, then the
#                         file index is assembled on rank 0. Helps when the tree
#                         has many subdirectories; little benefit for one giant
#                         flat directory. Ignored when loading a pickle.
#   parallel_scan: no  -> rank 0 walks the whole tree itself (original behaviour).
# Both find the same files; use `no` to A/B compare. Default: yes.
parallel_scan: yes

# Maximum directory recursion depth for the scan (both modes). Lower it to prune
# deep per-process subtrees you don't need. Default: 8.
scan_max_depth: 8

# Slice plane to read: one of xy, xz, yz.
plane: xy

# Resampling grid -----------------------------------------------------------
grid:
  # Number of grid POINTS along each axis (not cells).
  resolution: [1000, 1000]
  # Square box [-box_bound, +box_bound] in each direction.
  # For a non-square box, set min/max explicitly instead (see below).
  box_bound: 50.0
  # Optional explicit bounds; if given they override box_bound.
  # min: [-50.0, -50.0]
  # max: [ 50.0,  50.0]

# Interpolation order for resampling (postcactus `order`): 0 = nearest, 1 = linear.
interp_order: 1

# Output storage dtype. float32 halves file size; float64 preserves full precision.
dtype: float64

# Iteration query mode.
#   parallel_query: yes -> every rank queries its own slice of `variables`
#                          (variables[rank::size]) and resamples exactly those.
#                          The expensive per-variable TOC parse + per-iteration
#                          time reads are divided across ranks. The warmed
#                          SimDir is gathered to rank 0, so the pickle written
#                          (see simdir_pickle) is identical to the serial path.
#   parallel_query: no  -> rank 0 queries every variable, then broadcasts.
# Both produce identical output files; use `no` to A/B compare. Default: yes.
parallel_query: yes

# Resampling granularity.
#   resample_chunks: 1 -> one output file per variable, written by one rank
#                         (original behaviour). Parallelism is capped at the
#                         number of variables.
#   resample_chunks: N -> split each variable's iterations into N contiguous
#                         chunks and distribute the (variable, chunk) tasks
#                         across ranks, so up to (variables x N) ranks stay busy.
#                         Each chunk is written to a temporary partial file, then
#                         merged into the one final per-variable file. Output is
#                         identical to resample_chunks: 1.
# Use N > 1 when you have more ranks than variables (e.g. long time series).
# Default: 1.
resample_chunks: 1

# Subsample iterations: keep every Nth available iteration (1 = keep all).
iteration_stride: 1

# Optionally restrict the iteration range (null = no limit).
iteration_min: null
iteration_max: null

# gzip compression level for the HDF5 datasets (0-9; null disables compression).
compression_level: 4

# Variables to resample and store. Each becomes its own HDF5 file.
variables:
  - rho_b
  - pi
  - bulkRelax
  - bulkVisInvRelax
  - bulkVis
  - expansion_scalar
  - kin_vorticity_spatial_xy
  - temp
  - vel[0]
  - vel[1]
  - betax
  - betay
  - alp
  - w_lorentz
  - P
  - int_energy
